# .github/workflows/build-release.yml
#
# Builds standalone executables for Windows, Linux, and macOS using PyInstaller,
# then attaches them to a GitHub Release whenever you push a version tag (e.g. v1.0.0).
#
# HOW TO TRIGGER A RELEASE:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Build & Release

on:
  push:
    tags:
      - "v*" # Runs on any tag like v1.0.0, v2.1.3, etc.

permissions:
  contents: write # Required to create a GitHub Release and upload assets

jobs:
  # ── Linux (Ubuntu 20.04 container for glibc 2.31 compatibility) ──────────────
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 \
            python3-pip \
            python3-dev \
            binutils

      - name: Install Python dependencies
        run: |
          pip3 install pyinstaller

      - name: Build executable
        run: pyinstaller main.spec

      - name: Rename executable for upload
        run: mv dist/mpv_playlist_maker mpv_playlist_maker-linux

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpv_playlist_maker-linux

  # ── Windows & macOS (use hosted runners as before) ───────────────────────────
  build-other:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: mpv_playlist_maker-windows.exe
            executable: dist/mpv_playlist_maker.exe

          - os: macos-latest
            artifact_name: mpv_playlist_maker-macos
            executable: dist/mpv_playlist_maker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller main.spec

      - name: Rename executable for upload
        shell: bash
        run: mv "${{ matrix.executable }}" "${{ matrix.artifact_name }}"

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
