# .github/workflows/build-release.yml
#
# Builds standalone executables for Windows, Linux, and macOS using PyInstaller,
# then attaches them to a GitHub Release whenever you push a version tag (e.g. v1.0.0).
#
# HOW TO TRIGGER A RELEASE:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Build & Release

on:
  push:
    tags:
      - "v*" # Runs on any tag like v1.0.0, v2.1.3, etc.

permissions:
  contents: write # Required to create a GitHub Release and upload assets

jobs:
  # ── Linux (manylinux_2_28 for broad glibc compatibility) ──────────────────
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PyInstaller
        run: |
          /opt/python/cp311-cp311/bin/python3.11 -m pip install --upgrade pip
          /opt/python/cp311-cp311/bin/python3.11 -m pip install pyinstaller

      - name: Build executable
        run: /opt/python/cp311-cp311/bin/python3.11 -m PyInstaller main.spec

      - name: Rename executable for upload
        run: mv dist/mpv_playlist_maker mpv_playlist_maker-linux

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpv_playlist_maker-linux

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Disable Windows Defender
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller main.spec

      - name: Rename executable for upload
        shell: bash
        run: mv dist/mpv_playlist_maker.exe mpv_playlist_maker-windows.exe

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpv_playlist_maker-windows.exe

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller main.spec

      - name: Rename executable for upload
        run: mv dist/mpv_playlist_maker mpv_playlist_maker-macos

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpv_playlist_maker-macos
