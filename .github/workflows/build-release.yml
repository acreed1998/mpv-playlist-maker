# .github/workflows/build-release.yml
#
# Builds standalone executables for Windows, Linux, and macOS using PyInstaller,
# then attaches them to a GitHub Release whenever you push a version tag (e.g. v1.0.0).
#
# HOW TO TRIGGER A RELEASE:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Build & Release

on:
  push:
    tags:
      - "v*" # Runs on any tag like v1.0.0, v2.1.3, etc.

permissions:
  contents: write # Required to create a GitHub Release and upload assets

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mpv_playlist_maker-linux
            executable: dist/mpv_playlist_maker

          - os: windows-latest
            artifact_name: mpv_playlist_maker-windows.exe
            executable: dist/mpv_playlist_maker.exe

          - os: macos-latest
            artifact_name: mpv_playlist_maker-macos
            executable: dist/mpv_playlist_maker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install MediaInfo native library
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get install -y libmediainfo-dev
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install mediainfo
          elif [ "$RUNNER_OS" == "Windows" ]; then
            choco install mediainfo
          fi

      - name: Find MediaInfo DLL location (Windows debug)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path "C:\ProgramData\chocolatey" -Recurse -Filter "*.dll" |
            Where-Object { $_.Name -like "*mediainfo*" -or $_.Name -like "*MediaInfo*" } |
            Select-Object FullName

      - name: Build executable
        run: pyinstaller main.spec

      - name: Rename executable for upload
        shell: bash
        run: mv "${{ matrix.executable }}" "${{ matrix.artifact_name }}"

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
